onboarding = false

[theme]
name = "terminal"

[ui]
agent_panel_sort = "priority"
show_agent_labels_on_pane_borders = true

[ui.sidebar.agents]
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent", "state_text"],
]

[ui.sidebar.spaces]
rows = [
  ["state_icon", "workspace"],
  ["branch", "git_status"],
]

[ui.toast]
delivery = "terminal"
delay_seconds = 1

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true
